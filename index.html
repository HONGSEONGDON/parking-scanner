<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>번호판 인식기</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --accent: #f0c040;
    --text: #e6edf3;
    --text2: #7d8590;
    --border: rgba(240,192,64,0.25);
    --green: #3fb950;
    --red: #f85149;
    --blue: #0099ff;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .header {
    padding: 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .header-icon {
    width: 38px; height: 38px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .header-title { font-family: 'Black Han Sans', sans-serif; font-size: 17px; color: var(--accent); }
  .header-sub { font-size: 11px; color: var(--text2); margin-top: 1px; }
  .sheet-badge {
    margin-left: auto;
    background: rgba(240,192,64,0.15);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 10px;
    font-size: 11px; color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    white-space: nowrap;
  }

  /* 카메라 */
  .camera-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 4/3;
    background: #000;
    overflow: hidden;
  }
  #video {
    width: 100%; height: 100%;
    object-fit: cover;
  }
  #snapCanvas { display: none; }

  /* 번호판 가이드 */
  .plate-guide {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .plate-box {
    width: 82%; aspect-ratio: 4/1;
    position: relative;
    border: 2px dashed rgba(240,192,64,0.4);
    border-radius: 6px;
  }
  .corner { position: absolute; width: 18px; height: 18px; border-color: var(--accent); border-style: solid; }
  .corner.tl { top:-2px; left:-2px; border-width:3px 0 0 3px; border-radius:3px 0 0 0; }
  .corner.tr { top:-2px; right:-2px; border-width:3px 3px 0 0; border-radius:0 3px 0 0; }
  .corner.bl { bottom:-2px; left:-2px; border-width:0 0 3px 3px; border-radius:0 0 0 3px; }
  .corner.br { bottom:-2px; right:-2px; border-width:0 3px 3px 0; border-radius:0 0 3px 0; }
  .scan-line {
    position: absolute; left:0; right:0; height:2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scanline 2s ease-in-out infinite;
  }
  @keyframes scanline { 0%,100%{top:5%;opacity:0.4} 50%{top:95%;opacity:1} }
  .guide-label {
    position: absolute; bottom:-24px; left:50%;
    transform: translateX(-50%);
    font-size: 11px; color: rgba(240,192,64,0.7);
    white-space: nowrap;
  }

  /* 결과 표시 */
  .result-bar {
    position: absolute; bottom:0; left:0; right:0;
    padding: 10px 14px;
    background: linear-gradient(transparent, rgba(0,0,0,0.9));
    display: flex; align-items: center; gap: 10px;
  }
  .result-plate {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 24px; color: var(--accent);
    letter-spacing: 3px;
    text-shadow: 0 0 20px rgba(240,192,64,0.6);
    flex: 1;
    min-height: 32px;
  }
  .result-plate.empty { font-size: 12px; color: var(--text2); font-family: 'Noto Sans KR', sans-serif; letter-spacing: 0; line-height: 32px; }
  .save-btn {
    background: var(--accent); color: #0d1117;
    border: none; border-radius: 8px;
    padding: 8px 16px; font-weight: 700; font-size: 13px;
    cursor: pointer; white-space: nowrap;
    font-family: 'Noto Sans KR', sans-serif;
    display: none;
  }
  .save-btn.show { display: block; }
  .save-btn:active { opacity: 0.7; }

  /* 플래시 */
  .flash { position: absolute; inset:0; background:white; opacity:0; pointer-events:none; transition:opacity 0.08s; }
  .flash.show { opacity:0.5; }

  /* 촬영 버튼 */
  .camera-placeholder {
    position: absolute; inset:0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px; color: var(--text2); font-size: 13px; text-align: center;
  }
  .start-btn {
    display: block; width: calc(100% - 32px);
    margin: 0 16px 10px;
    background: var(--accent); color: #0d1117;
    border: none; border-radius: 12px;
    padding: 14px; font-size: 15px; font-weight: 700;
    cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
  }
  .start-btn:active { opacity: 0.8; }

  /* 캡처 버튼 */
  .capture-wrap {
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: none;
  }
  .capture-wrap.show { display: flex; gap: 8px; }
  .capture-btn {
    flex: 1;
    background: var(--accent); color: #0d1117;
    border: none; border-radius: 10px;
    padding: 12px; font-size: 14px; font-weight: 700;
    cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .capture-btn:active { opacity: 0.7; }
  .auto-btn {
    background: var(--surface2);
    color: var(--text2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px; font-size: 12px; font-weight: 700;
    cursor: pointer; white-space: nowrap;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .auto-btn.on { background: rgba(240,192,64,0.15); color: var(--accent); border-color: var(--accent); }

  /* 상태 */
  .status-bar {
    padding: 7px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .status-dot { width:8px; height:8px; border-radius:50%; background:var(--text2); flex-shrink:0; transition:all 0.3s; }
  .status-dot.scanning { background:var(--accent); animation:pulse 1s infinite; }
  .status-dot.saving { background:var(--blue); animation:pulse 0.5s infinite; }
  .status-dot.ok { background:var(--green); }
  .status-dot.error { background:var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .status-text { font-size: 12px; color: var(--text2); flex:1; }

  /* 수동 입력 */
  .manual-section {
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .manual-label { font-size: 10px; color: var(--text2); margin-bottom: 6px; letter-spacing: 0.5px; text-transform: uppercase; }
  .manual-row { display: flex; gap: 8px; }
  .manual-input {
    flex: 1;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 9px 12px;
    color: var(--text); font-family: 'JetBrains Mono', monospace;
    font-size: 15px; letter-spacing: 2px; outline: none;
    transition: border-color 0.2s;
  }
  .manual-input:focus { border-color: var(--accent); }
  .manual-input::placeholder { color: var(--text2); font-family: 'Noto Sans KR', sans-serif; font-size: 12px; letter-spacing: 0; }
  .manual-btn {
    background: var(--surface2); color: var(--accent);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 9px 16px; font-weight: 700; font-size: 13px;
    cursor: pointer; white-space: nowrap;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .manual-btn:active { opacity: 0.7; }

  /* 기록 */
  .log-section { flex:1; padding: 12px 16px; overflow-y: auto; }
  .log-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .log-title { font-size:11px; color:var(--text2); letter-spacing:0.5px; text-transform:uppercase; }
  .log-count { font-size:11px; background:var(--surface2); border:1px solid var(--border); border-radius:20px; padding:2px 10px; color:var(--accent); font-family:'JetBrains Mono',monospace; }
  .log-list { display:flex; flex-direction:column; gap:6px; }
  .log-item { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:10px 14px; display:flex; align-items:center; gap:12px; animation:slideIn 0.3s ease; }
  @keyframes slideIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
  .log-item.ok { border-left:3px solid var(--green); }
  .log-item.saving { border-left:3px solid var(--blue); }
  .log-item.error { border-left:3px solid var(--red); }
  .log-num { font-size:11px; color:var(--text2); font-family:'JetBrains Mono',monospace; min-width:22px; text-align:center; }
  .log-info { flex:1; min-width:0; }
  .log-plate { font-family:'Black Han Sans',sans-serif; font-size:16px; color:var(--accent); letter-spacing:2px; }
  .log-time { font-size:11px; color:var(--text2); margin-top:2px; }
  .log-badge { font-size:10px; padding:2px 8px; border-radius:10px; font-weight:600; white-space:nowrap; }
  .badge-ok { background:rgba(63,185,80,0.15); color:var(--green); }
  .badge-saving { background:rgba(0,153,255,0.15); color:var(--blue); }
  .badge-fail { background:rgba(248,81,73,0.15); color:var(--red); }
  .empty-log { text-align:center; color:var(--text2); font-size:13px; padding:30px 0; opacity:0.6; }

  /* 토스트 */
  .toast {
    position:fixed; top:68px; left:50%;
    transform:translateX(-50%) translateY(-20px);
    background:var(--surface2); border:1px solid var(--border);
    border-radius:20px; padding:10px 20px;
    font-size:13px; opacity:0; transition:all 0.3s;
    z-index:100; white-space:nowrap; pointer-events:none;
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  .toast.success { border-color:var(--green); color:var(--green); }
  .toast.fail { border-color:var(--red); color:var(--red); }
  .toast.info { border-color:var(--accent); color:var(--accent); }

  /* OCR 로딩 */
  .ocr-loading {
    position: absolute; inset:0;
    background: rgba(0,0,0,0.7);
    display: none; align-items:center; justify-content:center;
    flex-direction: column; gap: 12px;
  }
  .ocr-loading.show { display: flex; }
  .ocr-spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(240,192,64,0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .ocr-text { font-size: 13px; color: var(--accent); }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">🚗</div>
  <div>
    <div class="header-title">번호판 인식기</div>
    <div class="header-sub">차량 번호 자동 인식 → Google Sheets</div>
  </div>
  <div class="sheet-badge" id="sheetBadge">로딩중...</div>
</div>

<div class="camera-wrap" id="cameraWrap">
  <div id="cameraPlaceholder" class="camera-placeholder">
    <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.4">
      <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
      <circle cx="12" cy="13" r="4"/>
    </svg>
    <div style="line-height:1.6">아래 버튼을 눌러<br>카메라를 시작하세요</div>
  </div>
  <video id="video" style="display:none;" playsinline autoplay muted></video>
  <canvas id="snapCanvas"></canvas>

  <div class="plate-guide" id="plateGuide" style="display:none;">
    <div class="plate-box">
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
      <div class="scan-line"></div>
      <div class="guide-label">번호판을 이 안에 맞춰주세요</div>
    </div>
  </div>

  <div class="result-bar" id="resultBar" style="display:none;">
    <div class="result-plate empty" id="resultPlate">인식 대기중...</div>
    <button class="save-btn" id="saveBtn" onclick="saveCurrentPlate()">💾 저장</button>
  </div>

  <div class="ocr-loading" id="ocrLoading">
    <div class="ocr-spinner"></div>
    <div class="ocr-text">번호판 분석중...</div>
  </div>

  <div class="flash" id="flash"></div>
</div>

<button class="start-btn" id="startBtn" onclick="startCamera()">📷 카메라 시작</button>

<div class="capture-wrap" id="captureWrap">
  <button class="capture-btn" onclick="captureAndRecognize()">
    <span style="font-size:18px;">📸</span> 촬영 후 인식
  </button>
  <button class="auto-btn" id="autoBtn" onclick="toggleAuto()">자동인식 OFF</button>
</div>

<div class="status-bar">
  <div class="status-dot" id="statusDot"></div>
  <span class="status-text" id="statusText">카메라를 시작하세요</span>
</div>

<div class="manual-section">
  <div class="manual-label">직접 입력</div>
  <div class="manual-row">
    <input class="manual-input" id="manualInput" type="text" placeholder="예) 57후3098" maxlength="10">
    <button class="manual-btn" onclick="submitManual()">저장</button>
  </div>
</div>

<div class="log-section">
  <div class="log-header">
    <span class="log-title">인식 기록</span>
    <span class="log-count" id="logCount">0건</span>
  </div>
  <div class="log-list" id="logList">
    <div class="empty-log">아직 인식 기록이 없어요</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbysefkNet3OSKJ8wDuTJGPpZikpZKI-uRynxTRVUFN7-8gcYqYlih6pjkxIyTwomFpslQ/exec";
const urlParams = new URLSearchParams(window.location.search);
const SHEET_NAME = urlParams.get('sheet') || '주차기록';
document.getElementById('sheetBadge').textContent = '📋 ' + SHEET_NAME;

let logs = [], worker = null, currentPlate = '';
let lastSaved = '', lastSavedTime = 0;
let autoMode = false, autoInterval = null;
let cameraStarted = false;

// ── 상태 ──
function setStatus(type, text) {
  document.getElementById('statusDot').className = 'status-dot ' + type;
  document.getElementById('statusText').textContent = text;
}
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 3000);
}
function doFlash() {
  const f = document.getElementById('flash');
  f.classList.add('show');
  setTimeout(() => f.classList.remove('show'), 120);
}
function getNow() {
  const d = new Date(), p = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}

// ── 번호판 텍스트 추출 ──
function extractPlate(raw) {
  // 1. 공백/특수문자 정리
  let text = raw.replace(/\s+/g, '').replace(/[^0-9가-힣a-zA-Z]/g, '');

  // 2. 한국 번호판 패턴 매칭
  const patterns = [
    /\d{2,3}[가-힣]\d{4}/,       // 일반: 12가3456, 123가4567
    /[가-힣]{2}\d{2}[가-힣]\d{4}/, // 지역: 서울12가3456
    /\d{3}[가-힣]\d{4}/,
    /\d{2}[가-힣]\d{4}/,
  ];
  for (const p of patterns) {
    const m = text.match(p);
    if (m && m[0].length >= 6) return m[0];
  }

  // 3. 숫자+한글 6~9자 조합
  const nk = text.replace(/[^0-9가-힣]/g, '');
  if (nk.length >= 6 && nk.length <= 9) return nk;

  return null;
}

// ── 이미지 전처리 (인식률 향상) ──
function preprocessImage(video) {
  const canvas = document.getElementById('snapCanvas');
  const vw = video.videoWidth, vh = video.videoHeight;

  // 번호판 영역 크롭 (중앙 82%, 세로 28%)
  const cx = vw * 0.09, cy = vh * 0.36;
  const cw = vw * 0.82, ch = vh * 0.28;

  // 고해상도로 2배 확대
  canvas.width = cw * 2;
  canvas.height = ch * 2;
  const ctx = canvas.getContext('2d');

  // 1단계: 원본 크롭
  ctx.drawImage(video, cx, cy, cw, ch, 0, 0, cw * 2, ch * 2);

  // 2단계: 이미지 데이터 가져오기
  const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data = imgData.data;

  // 3단계: 그레이스케일 + 대비 강화
  for (let i = 0; i < data.length; i += 4) {
    const gray = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
    // 대비 강화 (임계값 기반)
    const enhanced = gray > 128 ? Math.min(255, gray * 1.3) : Math.max(0, gray * 0.6);
    data[i] = data[i+1] = data[i+2] = enhanced;
  }
  ctx.putImageData(imgData, 0, 0);

  return canvas.toDataURL('image/png', 1.0);
}

// ── OCR 초기화 ──
async function initWorker() {
  if (worker) return;
  setStatus('scanning', 'OCR 엔진 준비중...');
  worker = await Tesseract.createWorker('kor+eng', 1, { logger: () => {} });
  await worker.setParameters({
    tessedit_char_whitelist: '0123456789가나다라마바사아자하거너더러머버서어저고노도로모보소오조구누두루무부수우주아배',
    tessedit_pageseg_mode: '7',
    preserve_interword_spaces: '0',
  });
  setStatus('ok', '준비완료 — 촬영 버튼을 누르세요');
}

// ── 카메라 시작 ──
async function startCamera() {
  if (cameraStarted) return;
  const btn = document.getElementById('startBtn');
  btn.disabled = true; btn.textContent = '카메라 시작중...';

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: {ideal:1920}, height: {ideal:1080} }
    });
    const video = document.getElementById('video');
    video.srcObject = stream;
    video.style.display = 'block';
    document.getElementById('cameraPlaceholder').style.display = 'none';
    document.getElementById('plateGuide').style.display = 'flex';
    document.getElementById('resultBar').style.display = 'flex';
    document.getElementById('captureWrap').classList.add('show');
    btn.style.display = 'none';
    cameraStarted = true;

    video.onloadedmetadata = () => initWorker();
  } catch(e) {
    btn.disabled = false; btn.textContent = '📷 카메라 재시도';
    showToast('카메라 권한을 허용해주세요', 'fail');
  }
}

// ── 촬영 후 인식 (메인 기능) ──
async function captureAndRecognize() {
  if (!worker) { showToast('OCR 준비중입니다. 잠시 후 다시 시도하세요', 'info'); return; }
  const video = document.getElementById('video');
  if (!video.videoWidth) { showToast('카메라가 아직 준비되지 않았어요', 'fail'); return; }

  doFlash();
  if (navigator.vibrate) navigator.vibrate(40);
  document.getElementById('ocrLoading').classList.add('show');
  setStatus('scanning', '번호판 분석중...');

  try {
    // 여러 번 처리해서 최선의 결과 선택
    const results = [];
    for (let i = 0; i < 3; i++) {
      const imgData = preprocessImage(video);
      const { data: { text, confidence } } = await worker.recognize(imgData);
      const plate = extractPlate(text);
      if (plate) results.push({ plate, confidence });
      await new Promise(r => setTimeout(r, 100));
    }

    document.getElementById('ocrLoading').classList.remove('show');

    if (results.length > 0) {
      // 가장 신뢰도 높은 결과 선택
      results.sort((a,b) => b.confidence - a.confidence);
      const best = results[0].plate;
      currentPlate = best;

      const el = document.getElementById('resultPlate');
      el.textContent = best;
      el.classList.remove('empty');
      document.getElementById('saveBtn').classList.add('show');
      setStatus('ok', '인식완료: ' + best + ' — 저장 버튼을 누르세요');
      if (navigator.vibrate) navigator.vibrate([40, 30, 40]);
    } else {
      setStatus('error', '인식 실패 — 더 가까이 대주세요');
      showToast('번호판을 더 가까이, 정면에서 촬영해주세요', 'fail');
    }
  } catch(e) {
    document.getElementById('ocrLoading').classList.remove('show');
    setStatus('error', '오류 발생');
  }
}

// ── 자동 인식 토글 ──
function toggleAuto() {
  autoMode = !autoMode;
  const btn = document.getElementById('autoBtn');
  if (autoMode) {
    btn.textContent = '자동인식 ON';
    btn.classList.add('on');
    autoInterval = setInterval(captureAndRecognize, 3000);
    showToast('자동인식 시작 (3초마다)', 'info');
  } else {
    btn.textContent = '자동인식 OFF';
    btn.classList.remove('on');
    clearInterval(autoInterval);
    showToast('자동인식 중지', 'info');
  }
}

// ── 저장 ──
function saveCurrentPlate() {
  if (!currentPlate) return;
  const now = Date.now();
  if (currentPlate === lastSaved && now - lastSavedTime < 5000) {
    showToast('이미 저장된 번호판이에요', 'info'); return;
  }
  lastSaved = currentPlate; lastSavedTime = now;
  doFlash();
  if (navigator.vibrate) navigator.vibrate(80);
  saveToSheets(currentPlate);
}

function addLog(plate, status) {
  const id = Date.now();
  logs.unshift({ id, plate, time: getNow(), status });
  renderLogs(); return id;
}
function updateLog(id, status) {
  const item = logs.find(l => l.id === id);
  if (item) { item.status = status; renderLogs(); }
}
function renderLogs() {
  const list = document.getElementById('logList');
  document.getElementById('logCount').textContent = logs.length + '건';
  if (!logs.length) { list.innerHTML = '<div class="empty-log">아직 인식 기록이 없어요</div>'; return; }
  list.innerHTML = logs.slice(0,50).map((l,i) => {
    const badge = l.status==='ok' ? '<span class="log-badge badge-ok">저장완료</span>'
      : l.status==='saving' ? '<span class="log-badge badge-saving">저장중...</span>'
      : '<span class="log-badge badge-fail">저장실패</span>';
    return `<div class="log-item ${l.status}">
      <div class="log-num">${logs.length-i}</div>
      <div class="log-info">
        <div class="log-plate">${l.plate}</div>
        <div class="log-time">${l.time}</div>
      </div>${badge}</div>`;
  }).join('');
}

function saveToSheets(plate) {
  const id = addLog(plate, 'saving');
  setStatus('saving', '저장중: ' + plate);
  fetch(SCRIPT_URL, {
    method:'POST', mode:'no-cors',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ barcode: plate, sheet: SHEET_NAME })
  })
  .then(() => { updateLog(id,'ok'); setStatus('ok','저장완료!'); showToast('✓ 저장: '+plate,'success'); })
  .catch(() => { updateLog(id,'error'); setStatus('error','저장실패'); showToast('✗ 저장실패','fail'); });
}

function submitManual() {
  const input = document.getElementById('manualInput');
  const val = input.value.trim().replace(/\s/g,'');
  if (!val) { showToast('번호판을 입력해주세요','fail'); return; }
  doFlash(); saveToSheets(val); input.value='';
}
document.getElementById('manualInput').addEventListener('keydown', e => { if(e.key==='Enter') submitManual(); });
</script>
